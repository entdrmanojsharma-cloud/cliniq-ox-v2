# netlify.toml — Netlify deployment configuration for Cliniq-OX frontend
# This file tells Netlify how to build and serve the React Native Web app.

[build]
  base    = "frontend"
  command = "npx expo export --platform web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirect all routes to index.html (needed for React Navigation routing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
